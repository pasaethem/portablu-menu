<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PORTA BLU MEYHANE — Menü</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1628;
      --navy-mid: #0f1e3a;
      --navy-light: #162346;
      --gold: #c8a96e;
      --gold-light: #e8c98a;
      --white: #f5f0e8;
      --border: rgba(200, 169, 110, 0.3);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      font-family: 'Libre Baskerville', Georgia, serif;
      color: var(--white);
      overflow: hidden;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s ease, visibility 0.8s ease;
      padding: 40px 24px;
    }

    #splash.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .splash-ornament {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin-bottom: 28px;
    }

    .splash-brand {
      text-align: center;
      margin-bottom: 48px;
    }

    .splash-brand .logo-text {
      font-family: Arial, 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: clamp(28px, 8vw, 42px);
      letter-spacing: 0.18em;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.1;
      display: block;
    }

    .splash-brand .sub-text {
      font-family: Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(11px, 3vw, 13px);
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-top: 10px;
    }

    .splash-divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
      width: min(280px, 80vw);
    }

    .splash-divider::before,
    .splash-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .splash-diamond {
      width: 8px;
      height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .cta-btn {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      padding: 16px 40px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .cta-btn:hover::before { transform: translateX(0); }
    .cta-btn:hover { color: var(--navy); }
    .cta-btn:active { transform: scale(0.97); }

    /* ── VIEWER ── */
    #viewer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.8s ease 0.3s, visibility 0.8s ease 0.3s;
    }

    #viewer.visible {
      opacity: 1;
      visibility: visible;
    }

    /* Header */
    .viewer-header {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      font-family: Arial, 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.15em;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1.15;
    }

    .header-sub {
      font-family: Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .header-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .header-tag {
      font-family: Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* PDF Container */
    #pdf-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: #1a1a2e;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    #pdf-wrap::-webkit-scrollbar { width: 4px; }
    #pdf-wrap::-webkit-scrollbar-track { background: var(--navy); }
    #pdf-wrap::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    #pdf-canvas-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      gap: 0;
    }

    .pdf-page-wrapper {
      width: 100%;
      max-width: 600px;
      position: relative;
    }

    .pdf-page-wrapper canvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Loading state */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 20px;
    }

    .loader-ring {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* Footer nav */
    .viewer-footer {
      background: var(--navy-mid);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .page-info {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
      min-width: 80px;
      text-align: center;
    }

    .nav-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 16px;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(200,169,110,0.1);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Corner ornament */
    .corner-ornament {
      position: absolute;
      width: 12px;
      height: 12px;
      pointer-events: none;
    }
    .corner-ornament.tl { top: 0; left: 0; border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); }
    .corner-ornament.tr { top: 0; right: 0; border-top: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }
    .corner-ornament.bl { bottom: 0; left: 0; border-bottom: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); }
    .corner-ornament.br { bottom: 0; right: 0; border-bottom: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-ornament"></div>
  <div class="splash-brand">
    <span class="logo-text">PORTA BLU</span>
    <span class="logo-text">MEYHANE</span>
    <span class="sub-text">Dijital Menü</span>
  </div>
  <div class="splash-divider"><div class="splash-diamond"></div></div>
  <button class="cta-btn" onclick="openMenu()">Menüyü Görüntüle</button>
</div>

<!-- VIEWER -->
<div id="viewer">
  <header class="viewer-header">
    <div class="header-brand">
      <div>
        <div class="header-logo">PORTA BLU</div>
        <div class="header-sub">Meyhane</div>
      </div>
    </div>
    <div class="header-sep"></div>
    <div class="header-tag">Menü</div>
  </header>

  <div id="pdf-wrap">
    <div id="pdf-canvas-container">
      <div class="loading-state" id="loading">
        <div class="loader-ring"></div>
        <div class="loading-text">Menü Yükleniyor</div>
      </div>
    </div>
  </div>

  <footer class="viewer-footer">
    <button class="nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>&#8249;</button>
    <div class="page-info" id="page-info">— / —</div>
    <button class="nav-btn" id="next-btn" onclick="changePage(1)" disabled>&#8250;</button>
  </footer>
</div>

  // ── SPLASH → VIEWER ──
  function openMenu() {
    document.getElementById('splash').classList.add('fade-out');
    document.getElementById('viewer').classList.add('visible');
    if (!pdfDoc) loadPDF();
  }

  // ── LOAD PDF ──
  async function loadPDF() {
    try {
      const b64 = getPDFBase64();
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

      pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
      totalPages = pdfDoc.numPages;
      updateNav();
      await renderAll();
    } catch (e) {
      console.error('PDF yüklenemedi:', e);
      document.getElementById('loading').innerHTML =
        '<div class="loading-text" style="color:#c0392b">Menü yüklenemedi</div>';
    }
  }

  function getPDFBase64() {
    // Full PDF base64 embedded below
    return __PDF_DATA__;
  }

  // ── RENDER ALL PAGES ──
  async function renderAll() {
    const container = document.getElementById('pdf-canvas-container');
    container.innerHTML = '';
    const scale = getScale();

    for (let p = 1; p <= totalPages; p++) {
      const page = await pdfDoc.getPage(p);
      const viewport = page.getViewport({ scale });

      const wrapper = document.createElement('div');
      wrapper.className = 'pdf-page-wrapper';
      wrapper.id = 'page-' + p;

      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      wrapper.appendChild(canvas);

      // Corner ornaments on first page
      if (p === 1) {
        ['tl','tr','bl','br'].forEach(c => {
          const o = document.createElement('div');
          o.className = 'corner-ornament ' + c;
          wrapper.appendChild(o);
        });
      }

      container.appendChild(wrapper);

      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }

    updateNav();
    updatePageInfo();
  }

  function getScale() {
    const maxW = Math.min(600, window.innerWidth);
    return (maxW * (window.devicePixelRatio || 1)) / 595; // A4 width in pt
  }

  // ── NAVIGATION (scroll-based) ──
  function changePage(dir) {
    const target = currentPage + dir;
    if (target < 1 || target > totalPages) return;
    currentPage = target;
    const el = document.getElementById('page-' + currentPage);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
    updateNav();
    updatePageInfo();
  }

  // Track scroll position
  document.addEventListener('DOMContentLoaded', () => {
    const wrap = document.getElementById('pdf-wrap');
    if (wrap) {
      wrap.addEventListener('scroll', () => {
        if (!pdfDoc) return;
        for (let p = 1; p <= totalPages; p++) {
          const el = document.getElementById('page-' + p);
          if (!el) continue;
          const rect = el.getBoundingClientRect();
          if (rect.top <= window.innerHeight / 2) currentPage = p;
        }
        updateNav();
        updatePageInfo();
      });
    }
  });

  function updateNav() {
    const prev = document.getElementById('prev-btn');
    const next = document.getElementById('next-btn');
    if (prev) prev.disabled = currentPage <= 1;
    if (next) next.disabled = currentPage >= totalPages;
  }

  function updatePageInfo() {
    const el = document.getElementById('page-info');
    if (el && totalPages > 0) el.textContent = currentPage + ' / ' + totalPages;
  }

  // Re-render on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (pdfDoc) renderAll(); }, 300);
  });
</script>
